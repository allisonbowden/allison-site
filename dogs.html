<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dogs - Allison</title>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="allisonfest.css">
</head>
<body>
  <a class="back" href="hobbies.html">&larr; hobbies</a>

  <header>
    <p class="label">dogs</p>
    <h1>can i hang out with your dog?</h1>
    <p class="intro">professional dog enthusiast.</p>
  </header>

  <div class="dog-grid">
    <div class="dog-card">
      <img class="dog-photo" src="images/dog-2.jpg" alt="Archie, happy with his mouth open on a walk">
      <span class="dog-name">Archie</span>
    </div>
    <div class="dog-card tilt-r">
      <img class="dog-photo" src="images/dog-5.jpg" alt="Link, a light-colored chihuahua in a harness smelling daisies in the grass">
      <span class="dog-name">Link</span>
    </div>
    <div class="dog-card">
      <img class="dog-photo" src="images/dog-6.jpg" alt="Jess, a red golden retriever in a tiny tuxedo outfit, tongue out">
      <span class="dog-name">Jess</span>
    </div>
    <div class="dog-card tilt-r">
      <img class="dog-photo" src="images/dog-7.jpg" alt="Earl, a gray French Bulldog looking up happily on the grass">
      <span class="dog-name">Earl</span>
    </div>
    <div class="dog-card">
      <img class="dog-photo" src="images/dog-ande.jpg" alt="Ande, a black and tan dog in a harness looking up on a walk">
      <span class="dog-name">Ande</span>
    </div>
  </div>
  <p class="gallery-note">more good dogs coming soon</p>
</body>
</html>
