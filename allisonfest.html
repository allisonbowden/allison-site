<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>allisonfest - Allison</title>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="allisonfest.css">
</head>
<body>
  <a class="back" href="projects.html">&larr; projects</a>

  <header>
    <p class="label">past projects</p>
    <h1>allisonfest</h1>
    <p class="intro">my 30th birthday party/music festival.</p>
  </header>

  <div class="moments">

    <div class="moment">
      <div class="text">
        <a class="moment-link title-link" href="https://partiful.com/e/MpASDK0CbghXF8dYH8AB?c=dkXeD7G3" target="_blank" rel="noopener">
          view the invite
          <svg class="arrow" viewBox="0 0 20 20" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 16 C7 12.5 10 9.5 15 5" stroke="#c65a4f" stroke-width="1.6" fill="none" stroke-linecap="round"/>
            <path d="M9.3 5.6 C11.3 5.2 13.4 5 15 5 C14.7 6.6 14.3 8.5 13.9 10.4" stroke="#c65a4f" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">the look book</span>
        <div class="moment-photos">
          <img class="moment-photo" src="images/allisonfest-lookbook-moodboard.jpg"
               alt="AllisonFest lookbook moodboard: a collage of festival menswear outfit inspiration">
          <img class="moment-photo tilt-r" src="images/allisonfest-lookbook-moodboard-2.jpg"
               alt="AllisonFest lookbook moodboard: a collage of festival womenswear outfit inspiration">
        </div>
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">custom wristbands</span>
        <div class="moment-photos">
          <img class="moment-photo" src="images/allisonfest-wristband.jpg"
               alt="Guest wearing a custom AllisonFest 30th anniversary wristband, blowing bubbles on the rooftop">
          <img class="moment-photo tilt-r" src="images/allisonfest-wristband-sheet.jpg"
               alt="An uncut sheet of green AllisonFest 30th Anniversary San Francisco wristbands">
        </div>
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">rave sprouts</span>
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">a dj table</span>
        <img class="moment-photo" src="images/allisonfest-dj-table.jpg"
             alt="Friends dancing and hyping up the DJ table with a Pioneer DJ setup and disco lights at AllisonFest">
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">the playlist</span>
        <iframe class="moment-embed" title="AllisonFest playlist on Spotify"
                src="https://open.spotify.com/embed/playlist/3aZyClrRQK6zC7qdqh6Js7"
                height="352" frameborder="0" loading="lazy"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">iv drips &amp; check-ins</span>
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">vip section</span>
      </div>
    </div>

    <div class="moment">
      <div class="text">
        <span class="title">the lineup</span>
      </div>
    </div>

  </div>

  <div class="gallery">
    <p class="label">photos</p>
    <div class="gallery-grid">
      <div class="photo-slot filled">
        <img src="images/allisonfest-rooftop-view.jpg" alt="Sunset view of the Golden Gate Bridge from the AllisonFest rooftop">
      </div>
      <div class="photo-slot"></div>
      <div class="photo-slot"></div>
      <div class="photo-slot"></div>
      <div class="photo-slot"></div>
      <div class="photo-slot"></div>
    </div>
    <p class="gallery-note">photos coming soon</p>
  </div>

</body>
</html>
